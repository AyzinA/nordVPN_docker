services:
  vpn-gateway:
    container_name: nordvpn
    build:
      context: ./nordvpn
      dockerfile: Dockerfile
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.all.forwarding=0
    security_opt:
      - no-new-privileges:true
      - label:disable
    environment:
      - NORD_TOKEN=${NORD_TOKEN}
      - VPN_COUNTRY=${VPN_COUNTRY}
      - LAN_SUBNET=${LAN_SUBNET}
    restart: always
    # read_only: true
    stdin_open: true
    tty: true
    tmpfs:
      - /run
      - /tmp
    volumes:
      - ./nordvpn/dummy_resolv.conf:/etc/resolv.conf
    networks:
      wan_net:
        ipv4_address: ${WAN_IP}
        gw_priority: 10
      lan_net:
        ipv4_address: ${LAN_IP}
        gw_priority: 0

networks:
  wan_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${WAN_SUBNET}

  lan_net:
    driver: macvlan
    driver_opts:
      parent: ${LAN_INTERFACE}
      macvlan_mode: bridge
    ipam:
      config:
        - subnet: ${LAN_SUBNET}